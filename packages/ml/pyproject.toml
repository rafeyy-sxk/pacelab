[project]
name = "pacelab-ml"
version = "0.1.0"
description = "PaceLab ML training pipeline — run on Kaggle GPU or Oracle VM"
requires-python = ">=3.13"
dependencies = [
    "fastf1>=3.4.0",
    "xgboost>=2.1.0",
    "lightgbm>=4.5.0",
    "scikit-learn>=1.5.0",
    "shap>=0.46.0",
    "pandas>=2.2.0",
    "numpy>=2.0.0",
    "duckdb>=1.1.0",
    "pyarrow>=17.0.0",
    "mlflow>=2.17.0",
    "optuna>=4.0.0",
    "pyyaml>=6.0.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "jupyter>=1.1.0",
]
